<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Image Fetcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <h2>One Item</h2>
            <h3>Breed Name</h3>
            <div id="dogImageContainer">
                <img id="dogImage" src="" alt="Random Dog" style="max-width: 100%; height: auto;">
            </div>
            <button id="fetchImageBtn">Get Random Dog</button>
            <p>Click count: <span id="clickCount">0</span></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
